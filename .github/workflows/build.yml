name: Build FluxGram Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Setup MSVC environment
      uses: llvm/actions/setup-compilers@v1

    - name: Build FluxGram Desktop
      shell: powershell
      run: |
        $vcvars = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cmd /c "`"$vcvars`" && cmake -B build -G `"Visual Studio 17 2022`" -A x64 -DCMAKE_BUILD_TYPE=Release -DTDESKTOP_API_ID=2040 -DTDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627 -DDESKTOP_APP_DISABLE_CRASH_REPORTS=ON && cmake --build build --config Release --target Telegram -- /m:12 /nologo"
        Copy-Item "build/Release/AyuGram.exe" "FluxGram.exe" -Force

    - name: Compile Inno Setup Installer
      shell: powershell
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "FluxGramSetup.iss"

    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          FluxGramSetup.exe
          FluxGram.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
