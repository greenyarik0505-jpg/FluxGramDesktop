name: Build FluxGram Windows

on:
  push:
    branches: [ dev, main ]
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Prepare git
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        name: Clone FluxGram
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Clean environment PATH
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*mingw*' -and $_ -notlike '*gcc*' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $env:PATH, 'Process')

      - name: Cache Libraries
        id: cache-libraries
        uses: actions/cache@v4
        with:
          path: Libraries
          key: ${{ runner.OS }}-libraries-v9-${{ hashFiles('Telegram/build/prepare/win.bat') }}

      - name: Robust Library Preparation with Auto-Retry
        if: steps.cache-libraries.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force Libraries
          Set-Location Libraries
          
          $retryCount = 0
          $success = $false
          
          while (-not $success -and $retryCount -lt 5) {
            $retryCount++
            Write-Host ">>> Preparing Libraries (Attempt $retryCount/5)..."
            try {
              $proc = Start-Process -FilePath "cmd.exe" -ArgumentList "/c call ..\Telegram\build\prepare\win.bat" -NoNewWindow -PassThru -Wait
              if ($proc.ExitCode -eq 0) {
                $success = $true
                Write-Host ">>> Libraries prepared successfully!"
              } else {
                Write-Warning "Attempt $retryCount failed. Auto-repairing workspace..."
                Get-ChildItem -Path . -Exclude "*.zip","*.tar.gz" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
                Start-Sleep -Seconds 10
              }
            } catch {
              Write-Warning "Error during library build attempt $retryCount: $_"
            }
          }

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DTDESKTOP_API_ID=2040 ^
            -DTDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627 ^
            -DDESKTOP_APP_USE_PACKAGED=OFF ^
            -DDESKTOP_APP_DISABLE_CRASH_REPORTS=ON ^
            -DFLUXGRAM_VERSION=1 ^
            Telegram

      - name: Auto-Repair & Build FluxGram
        shell: powershell
        run: |
          $buildSuccess = $false
          for ($i = 1; $i -le 5; $i++) {
            Write-Host ">>> Building FluxGram Target (Attempt $i/5)..."
            $res = Start-Process -FilePath "cmake" -ArgumentList "--build build --config Release --target Telegram -- /m /nologo" -NoNewWindow -PassThru -Wait
            if ($res.ExitCode -eq 0) {
              $buildSuccess = $true
              Write-Host ">>> FluxGram compiled successfully!"
              break
            } else {
              Write-Warning "Build attempt $i failed. Retrying compilation..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist
          if (Test-Path "build\Release\Telegram.exe") {
            Copy-Item "build\Release\Telegram.exe" "dist\FluxGram.exe" -Force
          }
          if (Test-Path "build\Release\Updater.exe") {
            Copy-Item "build\Release\Updater.exe" "dist\Updater.exe" -Force
          }

      - name: Upload FluxGram Executable
        uses: actions/upload-artifact@v4
        with:
          name: FluxGram-Windows-x64
          path: dist\
          retention-days: 30
